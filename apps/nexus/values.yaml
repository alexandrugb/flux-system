apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: nexus
  namespace: nexus
spec:
  interval: 5m
  chart:
    spec:
      chart: nexus-repository-manager
      version: 64.2.0
      sourceRef:
        kind: HelmRepository
        name: sonatype
        namespace: flux-system
  values:
    persistence:
      enabled: true
      storageClass: local-sc-dir
      accessMode: ReadWriteOnce
      size: 50Gi
    nexus:
      resources:
        requests:
          memory: 2Gi
          cpu: 2
        limits:
          memory: 4Gi
          cpu: 4